<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Статус системы</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }
    
    /* Плашка статуса */
    .status-badge {
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 20px;
      font-weight: 600;
      text-transform: uppercase;
      color: white;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      margin-bottom: 30px;
      transition: all 0.3s ease;
    }
    .status-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
    }
    .status-on {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
    }
    .status-off {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
    }
    .status-on .status-dot {
      box-shadow: 0 0 10px #2ecc71;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Блок инструкции */
    .instructions {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .instructions h3 {
      margin: 0 0 16px 0;
      color: #333;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .instructions h3::before {
      content: "ℹ️";
    }
    .instructions ul {
      margin: 0;
      padding-left: 20px;
      color: #555;
      font-size: 14px;
      line-height: 1.6;
    }
    .instructions li {
      margin-bottom: 8px;
    }
    .instructions code {
      background: #f1f3f5;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      color: #d63384;
      font-size: 13px;
    }
    .instructions .example {
      margin-top: 12px;
      padding: 10px 14px;
      background: #f8f9fa;
      border-left: 3px solid #667eea;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      color: #444;
    }
    .instructions .example strong {
      color: #333;
    }

    /* Адаптив */
    @media (max-width: 480px) {
      .status-badge {
        padding: 14px 24px;
        font-size: 18px;
      }
      .instructions {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Плашка статуса -->
  <div id="status" class="status-badge">
    <span class="status-dot"></span>
    <span id="status-text">Загрузка...</span>
  </div>

  <!-- Инструкция -->
  <div class="instructions">
    <h3>Как изменить статус</h3>
    <ul>
      <li>Добавьте <code>?status=on</code> или <code>?status=off</code> к адресу сайта</li>
      <li>Нажмите <strong>Enter</strong> — статус обновится</li>
      <li>По умолчанию отображается <code>Off</code></li>
    </ul>
    <div class="example">
      <strong>Примеры:</strong><br>
      🔹 <code>site.com/?status=on</code> → 🟢 On<br>
      🔹 <code>site.com/?status=off</code> → 🔴 Off
    </div>
  </div>

  <script>
    // Читаем параметр status из URL
    const params = new URLSearchParams(window.location.search);
    const status = params.get('status')?.toLowerCase();

    const statusEl = document.getElementById('status');
    const textEl = document.getElementById('status-text');

    if (status === 'on') {
      statusEl.className = 'status-badge status-on';
      textEl.textContent = 'On';
    } else if (status === 'off') {
      statusEl.className = 'status-badge status-off';
      textEl.textContent = 'Off';
    } else {
      // Значение по умолчанию
      statusEl.className = 'status-badge status-off';
      textEl.textContent = 'Off';
    }
  </script>

</body>
</html>
